site:
  name: IRONPULSE
  site: 'https://ironpulse.example.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

metadata:
  title:
    default: IRONPULSE
    template: '%s — IRONPULSE'
  description: "Premium workout plans for every level. Train smarter, get stronger, and transform your body with IRONPULSE."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: IRONPULSE
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@ironpulse'
    site: '@ironpulse'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/blog/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark'
